name: Build Linux
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  build-linux:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Release Binary
        run: cargo build --release
      - name: Package Linux Tarball
        run: |
          mkdir -p release
          cp target/release/bunzo release/
          cp -r runtime release/
          tar -czf bunzo-linux-x86_64.tar.gz -C release .
      - uses: actions/upload-artifact@v4
        with:
          name: bunzo-linux
          path: bunzo-linux-x86_64.tar.gz