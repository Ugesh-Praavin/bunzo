name: Build Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Release Binary
        run: cargo build --release
      - name: Package Windows Zip
        shell: pwsh
        run: |
          Compress-Archive `
            -Path target/release/bunzo.exe `
            -DestinationPath bunzo-windows-x86_64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: bunzo-windows
          path: bunzo-windows-x86_64.zip