name: Release Package

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run E2E Release Packaging
        run: cargo xtask release

      - name: Upload Linux Staging
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: release/

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run E2E Release Packaging
        run: cargo xtask release

      - name: Upload Windows Staging
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: release/

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download Linux Staging
        uses: actions/download-artifact@v4
        with:
          name: release-linux
          path: release-linux/release/

      - name: Download Windows Staging
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: release-windows/release/

      - name: Create Combined Release Folder
        run: |
          mkdir -p release/portable
          mkdir -p release/checksums
          mkdir -p release/notes
          mkdir -p release/metadata
          mkdir -p release/manifests
          
          # Copy portable archives
          cp -r release-linux/release/portable/* release/portable/ || true
          cp -r release-windows/release/portable/* release/portable/ || true
          
          # Copy checksum files
          cp -r release-linux/release/checksums/* release/checksums/ || true
          cp -r release-windows/release/checksums/* release/checksums/ || true
          
          # Copy release metadata JSON files
          cp -r release-linux/release/metadata/release-metadata.json release/metadata/release-metadata-linux.json || true
          cp -r release-windows/release/metadata/release-metadata.json release/metadata/release-metadata-windows.json || true
          
          # Copy release notes
          cp -r release-windows/release/notes/release-notes.md release/notes/release-notes.md || true

      - name: Merge Manifests
        run: cargo xtask merge release-linux release-windows .

      - name: Create Draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body_path: release/notes/release-notes.md
          files: |
            release/portable/*
            release/checksums/*
            release/metadata/*
            release/manifests/*
            release/notes/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}