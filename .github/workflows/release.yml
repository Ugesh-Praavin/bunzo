name: Release to SourceForge

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release Binary
        run: cargo build --release

      - name: Package Linux Tarball
        run: |
          mkdir -p release
          cp target/release/bunzo release/
          cp -r runtime release/
          tar -czf bunzo-linux-x86_64.tar.gz -C release .

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bunzo-linux
          path: bunzo-linux-x86_64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release Binary
        run: cargo build --release

      - name: Package Windows Zip
        shell: pwsh
        run: |
          mkdir release
          copy target/release/bunzo.exe release/
          Copy-Item -Path runtime -Destination release/runtime -Recurse
          Compress-Archive -Path release/* -DestinationPath bunzo-windows-x86_64.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bunzo-windows
          path: bunzo-windows-x86_64.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: bunzo-linux
          path: release

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: bunzo-windows
          path: release

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SF_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H frs.sourceforge.net >> ~/.ssh/known_hosts

      - name: Create Remote Directory
        run: |
          ssh ${{ secrets.SF_USERNAME }}@frs.sourceforge.net "mkdir -p /home/frs/project/bunzo/${{ github.ref_name }}/"

      - name: Upload to SourceForge
        run: |
          scp \
            release/bunzo-linux-x86_64.tar.gz \
            release/bunzo-windows-x86_64.zip \
            scripts/install.sh \
            scripts/install.ps1 \
            ${{ secrets.SF_USERNAME }}@frs.sourceforge.net:/home/frs/project/bunzo/${{ github.ref_name }}/