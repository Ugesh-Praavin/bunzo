name: Release to SourceForge
on:
  workflow_run:
    workflows: ["Build Windows"]
    types: [completed]
    branches: [main]

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Linux Build Run ID
        id: get-linux-run
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-linux.yml',
              status: 'success',
              per_page: 1
            });
            return runs.data.workflow_runs[0].id;
          result-encoding: string

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: bunzo-linux
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.get-linux-run.outputs.result }}
          path: release

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: bunzo-windows
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          path: release

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SF_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H frs.sourceforge.net >> ~/.ssh/known_hosts

      - name: Upload to SourceForge
        run: |
          scp \
            release/bunzo-linux-x86_64.tar.gz \
            release/bunzo-windows-x86_64.zip \
            scripts/install.sh \
            scripts/install.ps1 \
            ${{ secrets.SF_USERNAME }}@frs.sourceforge.net:/home/frs/project/bunzo/